<!-- ==========================================
     FIND & FOUND - СТРАНИЦА РЕГИСТРАЦИИ
     Форма для создания новой учетной записи
     ========================================== -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <!-- Мета-информация о странице -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Find & Found</title>
    
    <!-- Подключение CSS стилей -->
    <link rel="stylesheet" href="static/main.css">
</head>
<body>
    <!-- НАВИГАЦИЯ И ЗАГОЛОВОК -->
    <header>
        <!-- Логотип -->
        <a href="/" class="header_item"> Find & Found</a>
        
        <!-- МЕНЮ НАВИГАЦИИ -->
        <div style="display: flex; gap: 20px;">
            <!-- Ссылка на вход -->
            <a href="/signin" class="header_item">Войти</a>
            
            <!-- Ссылка на главную -->
            <a href="/" class="header_item">На главную</a>
        </div>
    </header>

    <!-- КОНТЕЙНЕР ФОРМЫ РЕГИСТРАЦИИ -->
    <div class="login_card">
        <!-- ЗАГОЛОВОК -->
        <h1>Создать аккаунт</h1>
        
        <!-- ФОРМА РЕГИСТРАЦИИ -->
        <form action="/signup" method="post">
            <!-- ПОЛЕ ВВОДА ИМЕНИ ПОЛЬЗОВАТЕЛЯ -->
            <div class="input-group">
                <label for="username">Имя пользователя</label>
                <input type="text" 
                       id="username"
                       name="username" 
                       placeholder="Выберите имя пользователя" 
                       autocomplete="username" 
                       required>
            </div>
            
            <!-- ПОЛЕ ВВОДА ПАРОЛЯ -->
            <div class="input-group">
                <label for="password">Пароль</label>
                <input type="password" 
                       id="password"
                       name="password" 
                       placeholder="Введите пароль (минимум 6 символов)" 
                       autocomplete="new-password" 
                       required
                       minlength="6">
            </div>
            
            <!-- КНОПКА РЕГИСТРАЦИИ -->
            <button type="submit" class="signin_btn">Зарегистрироваться</button>
            
            <!-- ССЫЛКА НА ВХОД -->
            <div class="register_link" style="margin-top: 20px;">
                <p>Уже есть аккаунт? <a href="/signin">Войти</a></p>
            </div>
        </form>
    </div>
</body>
</html>
