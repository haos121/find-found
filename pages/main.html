<!--создание HTML файла-->
<!DOCTYPE html>
<!--язык страницы (опционально)-->
<html lang="en">
<!--тег head нужен для ключевой настройки страницы-->
<head>
    <meta charset="UTF-8">
    <title>Find & Foud</title>
    <!--подключение css файла с стилями-->
    <link rel="stylesheet" href="../static/CSS/main.css">
</head>
<body>
    <!--базоовый объект страницы-->
    <header>asdasdasdasdasd</header>
    <!--кнопка-->
    <button onclick="a()">нажми</button>
    <!--js код страницы-->
    <script>
        // обработчик нажатия на кнопку
            function a() {
                alert('привет')
            };
    </script>
</body>
</html>
